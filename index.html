<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BBH BARTLE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* HERO /
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 38% center;
      filter: brightness(70%) contrast(110%);
    }

    / TITLE OVERLAY /
    .overlay {
      position: absolute;
      bottom: 14%;
      left: 5%;
      max-width: 55%;
    }

    .overlay h1 {
      font-family: "BBH Bartle", sans-serif;
      font-size: clamp(1.8rem, 5vw, 3.4rem);
      margin: 0;
      letter-spacing: 0.05em;
      line-height: 0.95;
    }

    / QUESTION SECTION /
    .question {
      padding: 80px 20px;
      text-align: center;
      background: black;
    }

    .question p {
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }

    / NAV /
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 0.4;
    }

    / FOOTER */
    .footer {
      text-align: center;
      padding: 30px;
      font-size: 0.6rem;
      opacity: 0.4;
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">
    <div class="overlay">
      <h1>REPUGNANT</h1>
    </div>
  </section>

  <div class="question">
    <p>who the fuck is Parker Morgan?</p>
  </div>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
