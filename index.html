<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: 'Oswald', Arial, sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      filter: brightness(75%) contrast(110%);
    }

    .overlay {
      position: absolute;
      bottom: 8%;
      left: 5%;
    }

    .overlay h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 0.15em;
    }

    .overlay p {
      margin-top: 10px;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      opacity: 0.8;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 0.4;
    }

    .footer {
      text-align: center;
      padding: 30px;
      font-size: 0.7rem;
      opacity: 0.4;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">

    <div class="overlay">
      <h1>REPUGNANT</h1>
      <p>music / image / control</p>
    </div>
  </section>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
