<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BBH BARTLE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* HERO WRAPPER /
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    / IMAGE (POSTER STYLE) /
    .hero img {
      max-width: 95%;
      max-height: 75vh;
      height: auto;
      width: auto;
      display: block;
      filter: brightness(75%) contrast(110%);
    }

    / TITLE BELOW IMAGE /
    .title {
      margin-top: 20px;
      text-align: center;
    }

    .title h1 {
      font-family: "BBH Bartle", sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      letter-spacing: 0.05em;
      margin: 0;
    }

    / QUESTION /
    .question {
      padding: 60px 20px;
      text-align: center;
    }

    .question p {
      font-size: 0.95rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }

    / NAV /
    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 0.4;
    }

    / FOOTER */
    .footer {
      text-align: center;
      padding: 30px;
      font-size: 0.6rem;
      opacity: 0.4;
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">

    <div class="title">
      <h1>REPUGNANT</h1>
    </div>
  </section>

  <div class="question">
    <p>who the fuck is Parker Morgan?</p>
  </div>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
