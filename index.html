<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 35% center;
      filter: brightness(65%) contrast(110%);
    }

    .overlay {
      position: absolute;
      bottom: 8%;
      left: 5%;
    }

    .overlay h1 {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 0.1em;
    }

    .overlay p {
      margin-top: 10px;
      letter-spacing: 0.3em;
      font-size: 0.8rem;
      opacity: 0.8;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
      text-align: center;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.2em;
      transition: opacity 0.2s ease;
    }

    .nav a:hover {
      opacity: 0.5;
    }

    .footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.7rem;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">

    <div class="overlay">
      <h1>REPUGNANT</h1>
      <p>music / image / control</p>
    </div>
  </section>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
