<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: 'Inter', Arial, sans-serif;
      overflow-x: hidden;
    }

    /* HERO /
    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 35% center;
      filter: brightness(55%) contrast(115%) saturate(110%);
    }

    / DARK OVERLAY FOR DEPTH /
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
    }

    .overlay {
      position: absolute;
      bottom: 8%;
      left: 5%;
      z-index: 2;
    }

    .overlay h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 5rem;
      letter-spacing: 0.2em;
      margin: 0;
      font-weight: 600;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,0.15);
    }

    .overlay p {
      margin-top: 12px;
      letter-spacing: 0.4em;
      font-size: 0.75rem;
      opacity: 0.7;
    }

    / NAV /
    .nav {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding: 50px 20px;
      text-align: center;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      transition: all 0.25s ease;
      position: relative;
    }

    .nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0%;
      height: 1px;
      background: white;
      transition: width 0.25s ease;
    }

    .nav a:hover {
      opacity: 0.6;
    }

    .nav a:hover::after {
      width: 100%;
    }

    / FOOTER */
    .footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.65rem;
      opacity: 0.4;
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">

    <div class="overlay">
      <h1>REPUGNANT</h1>
      <p>music / image / control</p>
    </div>
  </section>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
