<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REPUGNANT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- BBH BARTLE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BBH+Bartle&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(75%) contrast(110%);
    }

    .overlay {
      position: absolute;
      bottom: 6%;
      left: 4%;
    }

    .overlay h1 {
      font-family: "BBH Bartle", sans-serif;
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin: 0;
      letter-spacing: 0.05em;
    }

    .question {
      padding: 60px 20px;
      text-align: center;
    }

    .question p {
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      opacity: 0.8;
    }

    .nav {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }

    .nav a {
      color: white;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      opacity: 0.8;
    }

    .nav a:hover {
      opacity: 0.4;
    }

    .footer {
      text-align: center;
      padding: 30px;
      font-size: 0.6rem;
      opacity: 0.4;
      letter-spacing: 0.2em;
    }
  </style>
</head>

<body>

  <section class="hero">
    <img src="pyromania-pm-bg-img.jpg" alt="Parker">

    <div class="overlay">
      <h1>REPUGNANT</h1>
    </div>
  </section>

  <div class="question">
    <p>who the fuck is Parker Morgan?</p>
  </div>

  <div class="nav">
    <a href="#">LISTEN</a>
    <a href="#">WATCH</a>
    <a href="#">CONTACT</a>
  </div>

  <div class="footer">
    © REPUGNANT
  </div>

</body>
</html>
